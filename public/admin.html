<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin panel — manage doctors, view users, and monitor system analytics.">
  <title>Admin Panel — Medicare</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1>⚙️ Admin <span class="text-gradient">Panel</span></h1>
      <p>Manage doctors, view users, and monitor system analytics.</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="adminStats">
      <div class="card stat-card">
        <div class="stat-icon blue">👥</div>
        <div>
          <div class="stat-value" id="statUsers">-</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="card stat-card">
        <div class="stat-icon green">📋</div>
        <div>
          <div class="stat-value" id="statAnalyses">-</div>
          <div class="stat-label">Total Analyses</div>
        </div>
      </div>
      <div class="card stat-card">
        <div class="stat-icon orange">👨‍⚕️</div>
        <div>
          <div class="stat-value" id="statDoctors">-</div>
          <div class="stat-label">Total Doctors</div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab('doctors', this)">👨‍⚕️ Manage Doctors</button>
      <button class="admin-tab" onclick="switchAdminTab('users', this)">👥 Users</button>
      <button class="admin-tab" onclick="switchAdminTab('records', this)">📋 Records</button>
    </div>

    <!-- Doctors Panel -->
    <div class="admin-panel-section active" id="panel-doctors">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 style="font-size: 1.1rem;">Doctors List</h3>
        <button class="btn btn-primary btn-sm" onclick="openAddDoctorModal()">+ Add Doctor</button>
      </div>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="data-table-container" id="doctorsTable">
          <div class="loader">
            <div class="spinner"></div> Loading...
          </div>
        </div>
      </div>
    </div>

    <!-- Users Panel -->
    <div class="admin-panel-section" id="panel-users">
      <h3 style="font-size: 1.1rem; margin-bottom: 16px;">Registered Users</h3>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="data-table-container" id="usersTable">
          <div class="loader">
            <div class="spinner"></div> Loading...
          </div>
        </div>
      </div>
    </div>

    <!-- Records Panel -->
    <div class="admin-panel-section" id="panel-records">
      <h3 style="font-size: 1.1rem; margin-bottom: 16px;">All Symptom Records</h3>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="data-table-container" id="recordsTable">
          <div class="loader">
            <div class="spinner"></div> Loading...
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Doctor Modal -->
  <div class="modal-overlay" id="doctorModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Doctor</h3>
        <button class="modal-close" onclick="closeDoctorModal()">×</button>
      </div>
      <form onsubmit="saveDoctorForm(event)">
        <input type="hidden" id="editDoctorId">
        <div class="form-group">
          <label class="form-label" for="docName">Doctor Name</label>
          <input class="form-input" type="text" id="docName" placeholder="Dr. John Smith" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="docSpec">Specialization</label>
          <select class="form-input" id="docSpec" required>
            <option value="">Select Specialization</option>
            <option value="General Physician">General Physician</option>
            <option value="Neurologist">Neurologist</option>
            <option value="Cardiologist">Cardiologist</option>
            <option value="Dermatologist">Dermatologist</option>
            <option value="Gastroenterologist">Gastroenterologist</option>
            <option value="Pulmonologist">Pulmonologist</option>
            <option value="ENT Specialist">ENT Specialist</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="docHospital">Hospital</label>
          <input class="form-input" type="text" id="docHospital" placeholder="Apollo Hospital">
        </div>
        <div class="form-group">
          <label class="form-label" for="docLocation">Location</label>
          <input class="form-input" type="text" id="docLocation" placeholder="Mumbai, India">
        </div>
        <div class="form-group">
          <label class="form-label" for="docContact">Contact</label>
          <input class="form-input" type="text" id="docContact" placeholder="+91 98765 43210">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="saveDoctorBtn">Save Doctor</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if not admin
    if (!isLoggedIn() || !isAdmin()) {
      showToast('Admin access required', 'error');
      setTimeout(() => window.location.href = '/login', 1000);
    }

    function switchAdminTab(tab, el) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-panel-section').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
    }

    // Load stats
    async function loadStats() {
      try {
        const data = await apiCall('/api/admin/stats');
        document.getElementById('statUsers').textContent = data.stats.totalUsers;
        document.getElementById('statAnalyses').textContent = data.stats.totalAnalyses;
        document.getElementById('statDoctors').textContent = data.stats.totalDoctors;
      } catch (err) {
        console.error('Stats error:', err);
      }
    }

    // Load doctors table
    async function loadDoctorsTable() {
      try {
        const data = await apiCall('/api/doctors');
        const container = document.getElementById('doctorsTable');

        if (data.doctors.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No doctors registered yet.</p></div>';
          return;
        }

        container.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Specialization</th>
                <th>Hospital</th>
                <th>Location</th>
                <th>Contact</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${data.doctors.map(doc => `
                <tr>
                  <td><strong>${doc.name}</strong></td>
                  <td>${doc.specialization}</td>
                  <td>${doc.hospital}</td>
                  <td>${doc.location}</td>
                  <td>${doc.contact}</td>
                  <td>
                    <button class="btn btn-sm btn-secondary" onclick='editDoctor(${JSON.stringify(doc).replace(/'/g, "&#39;")})'>Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteDoctor('${doc.doctor_id || doc.id}')">Delete</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        document.getElementById('doctorsTable').innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    // Load users table
    async function loadUsersTable() {
      try {
        const data = await apiCall('/api/admin/users');
        const container = document.getElementById('usersTable');

        container.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Role</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody>
              ${data.users.map(u => `
                <tr>
                  <td><strong>${u.name}</strong></td>
                  <td>${u.email}</td>
                  <td>${u.age || '-'}</td>
                  <td>${u.gender || '-'}</td>
                  <td><span class="severity-badge ${u.role === 'admin' ? 'severity-high' : 'severity-low'}">${u.role || 'user'}</span></td>
                  <td>${u.created_at ? formatDate(u.created_at) : '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        document.getElementById('usersTable').innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    // Load records table
    async function loadRecordsTable() {
      try {
        const data = await apiCall('/api/admin/records');
        const container = document.getElementById('recordsTable');

        if (data.records.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No symptom records yet.</p></div>';
          return;
        }

        container.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>User ID</th>
                <th>Symptoms</th>
                <th>Predicted Disease</th>
                <th>Confidence</th>
              </tr>
            </thead>
            <tbody>
              ${data.records.map(r => `
                <tr>
                  <td>${formatDate(r.date)}</td>
                  <td style="font-size: 0.8rem;">${(r.user_id || '').substring(0, 8)}...</td>
                  <td>${(r.symptoms || []).map(s => symptomIdToLabel(s)).join(', ')}</td>
                  <td><strong>${r.predicted_disease}</strong></td>
                  <td>${r.confidence || 0}%</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        document.getElementById('recordsTable').innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    // Doctor Modal
    function openAddDoctorModal() {
      document.getElementById('modalTitle').textContent = 'Add Doctor';
      document.getElementById('editDoctorId').value = '';
      document.getElementById('docName').value = '';
      document.getElementById('docSpec').value = '';
      document.getElementById('docHospital').value = '';
      document.getElementById('docLocation').value = '';
      document.getElementById('docContact').value = '';
      document.getElementById('doctorModal').classList.add('active');
    }

    function editDoctor(doc) {
      document.getElementById('modalTitle').textContent = 'Edit Doctor';
      document.getElementById('editDoctorId').value = doc.doctor_id || doc.id;
      document.getElementById('docName').value = doc.name;
      document.getElementById('docSpec').value = doc.specialization;
      document.getElementById('docHospital').value = doc.hospital;
      document.getElementById('docLocation').value = doc.location;
      document.getElementById('docContact').value = doc.contact;
      document.getElementById('doctorModal').classList.add('active');
    }

    function closeDoctorModal() {
      document.getElementById('doctorModal').classList.remove('active');
    }

    async function saveDoctorForm(e) {
      e.preventDefault();
      const btn = document.getElementById('saveDoctorBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      const id = document.getElementById('editDoctorId').value;
      const doctorData = {
        name: document.getElementById('docName').value,
        specialization: document.getElementById('docSpec').value,
        hospital: document.getElementById('docHospital').value,
        location: document.getElementById('docLocation').value,
        contact: document.getElementById('docContact').value
      };

      try {
        if (id) {
          await apiCall(`/api/doctors/${id}`, { method: 'PUT', body: JSON.stringify(doctorData) });
          showToast('Doctor updated successfully!', 'success');
        } else {
          await apiCall('/api/doctors', { method: 'POST', body: JSON.stringify(doctorData) });
          showToast('Doctor added successfully!', 'success');
        }
        closeDoctorModal();
        loadDoctorsTable();
        loadStats();
      } catch (err) {
        showToast(err.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Save Doctor';
    }

    async function deleteDoctor(id) {
      if (!confirm('Are you sure you want to delete this doctor?')) return;

      try {
        await apiCall(`/api/doctors/${id}`, { method: 'DELETE' });
        showToast('Doctor deleted successfully!', 'success');
        loadDoctorsTable();
        loadStats();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Initialize
    if (isLoggedIn() && isAdmin()) {
      loadStats();
      loadDoctorsTable();
      loadUsersTable();
      loadRecordsTable();
    }
  </script>
</body>

</html>
