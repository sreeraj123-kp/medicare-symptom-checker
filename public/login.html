<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login or create an account to access the AI Cloud Symptom Checker dashboard.">
  <title>Login / Signup — Medicare</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="auth-container">
    <div class="card card-elevated auth-card">
      <div style="text-align: center; margin-bottom: 24px;">
        <div style="font-size: 2.5rem; margin-bottom: 8px;">🏥</div>
        <h2 style="font-size: 1.3rem;">Welcome to Medicare</h2>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')" id="loginTab">Login</button>
        <button class="auth-tab" onclick="switchAuthTab('signup')" id="signupTab">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">
          Login
        </button>
        <p style="text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--gray-500);">
          Admin: admin@symptomchecker.com / admin123
        </p>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label" for="signupName">Full Name</label>
          <input class="form-input" type="text" id="signupName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email Address</label>
          <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signupPassword">Password</label>
          <input class="form-input" type="password" id="signupPassword" placeholder="Create a password" required
            minlength="6">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label class="form-label" for="signupAge">Age</label>
            <input class="form-input" type="number" id="signupAge" placeholder="25" min="1" max="120">
          </div>
          <div class="form-group">
            <label class="form-label" for="signupGender">Gender</label>
            <select class="form-input" id="signupGender">
              <option value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="signupBtn">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    function switchAuthTab(tab) {
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const data = await apiCall('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });

        setToken(data.token);
        setUser(data.user);
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/admin' : '/checker';
        }, 800);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const data = await apiCall('/api/auth/signup', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('signupName').value,
            email: document.getElementById('signupEmail').value,
            password: document.getElementById('signupPassword').value,
            age: parseInt(document.getElementById('signupAge').value) || null,
            gender: document.getElementById('signupGender').value || null
          })
        });

        setToken(data.token);
        setUser(data.user);
        showToast('Account created successfully!', 'success');
        setTimeout(() => {
          window.location.href = '/checker';
        }, 800);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // Redirect if already logged in
    if (isLoggedIn()) {
      window.location.href = '/checker';
    }
  </script>
</body>

</html>
